services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      DEBUG: "true"
      API_V1_PREFIX: /api/v1
      FRONTEND_ORIGIN: http://localhost:5173
      PUBLIC_BASE_URL: http://localhost:8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/mizumba
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-before-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      EMAIL_CONFIRMATION_TOKEN_EXPIRE_HOURS: 24
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: 30
      UPLOAD_DIR: uploads
      MAX_UPLOAD_SIZE_MB: 10
      MAX_AUDIO_UPLOAD_SIZE_MB: 25
      ENABLE_WHISPER_TRANSCRIPTION: "false"
      WHISPER_MODEL_NAME: base
      WHISPER_DEFAULT_LANGUAGE: ""
      GOOGLE_CLIENT_ID: ""
      APPLE_CLIENT_ID: ""
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_EMAIL: noreply@mizumba.app
      SMTP_USE_TLS: "true"
      STORAGE_PROVIDER: local
      S3_BUCKET: ""
      S3_REGION: ""
      S3_ACCESS_KEY_ID: ""
      S3_SECRET_ACCESS_KEY: ""
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      RATE_LIMIT_REQUESTS: 120
      RATE_LIMIT_WINDOW_SECONDS: 60
      DEFAULT_COUNTRY_CODE: DEFAULT
      AUTH_PROVIDER_RULES_JSON: '{"DEFAULT":{"google":true,"apple":true},"RU":{"google":false,"apple":false}}'
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mizumba
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mizumba"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
